{% extends 'core/base.html' %}

{% block title %}
    Institute
{% endblock title %}

{% block content %}

<style>

    .form-container {
        margin-left: 30%;
        margin-top: 5%;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
    }

    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }

    label {
        font-size: 14px;
        font-weight: bold;
        color: #555;
        display: block;
        margin-bottom: 8px;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        box-sizing: border-box;
    }

    input[type="text"]:focus {
        border-color: #0056b3;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #0056b3;
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #004494;
    }

    button:focus {
        outline: none;
    }

    .form-container p {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #888;
    }

    .form-container p a {
        color: #0056b3;
        text-decoration: none;
    }

    .form-container p a:hover {
        text-decoration: underline;
    }
</style>

<h1>Institute</h1>

<div class="form-container">
    <h2>Add Institute</h2>
    <form method="POST">
        {% csrf_token %}
        <label for="name">Institute Name:</label>
        <input type="text" id="name" name="name" required><br>
        <button type="submit">Add Institute</button>
    </form>
</div>

{% endblock content %}
